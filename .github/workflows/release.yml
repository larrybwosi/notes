name: Release App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Setup Git Credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine Next Semantic Version
        id: versioning
        run: |
          # Fetch all tags
          git fetch --tags --force

          # Find latest tag matching v*
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1 || echo "")
          echo "Latest tag found: '$LATEST_TAG'"

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            # Strip leading 'v'
            VERSION_STR=${LATEST_TAG#v}
            # Parse major.minor.patch
            IFS='.' read -r major minor patch <<< "$VERSION_STR"
            # Increment patch version
            NEW_PATCH=$((patch + 1))
            NEW_TAG="v$major.$minor.$NEW_PATCH"
          fi

          VERSION_STR=${NEW_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION_STR"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))

          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_STR" >> $GITHUB_OUTPUT

      - name: Create and Push Git Tag
        run: |
          TAG_NAME="${{ steps.versioning.outputs.tag }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease -PapkVersionCode=${{ steps.versioning.outputs.version_code }} -PapkVersionName=${{ steps.versioning.outputs.version_name }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.versioning.outputs.tag }}"
          gh release create "$TAG_NAME" \
            app/build/outputs/apk/release/app-release.apk \
            --title "Release $TAG_NAME" \
            --notes "Automated release of version $TAG_NAME on push to main."
